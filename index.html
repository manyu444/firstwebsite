<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Promotion Website | MANYU444</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

/* HEADER */
header{
    background:#111;
    color:#fff;
    padding:25px;
    text-align:center;
}

header h1{
    font-size:32px;
}

/* NAVIGATION */
nav{
    background:#e60000;
    display:flex;
    justify-content:center;
}

nav a{
    color:#fff;
    text-decoration:none;
    padding:12px 20px;
    font-weight:bold;
}

/* SECTION */
section{
    padding:30px;
    max-width:900px;
    margin:auto;
}

.card{
    background:#fff;
    padding:20px;
    margin-bottom:20px;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h2{
    margin-bottom:10px;
    color:#e60000;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:10px;
    background:#e60000;
    color:#fff;
    padding:10px 15px;
    text-decoration:none;
    font-weight:bold;
    border-radius:4px;
}

/* YOUTUBE EMBED */
iframe{
    width:100%;
    height:315px;
    margin-top:15px;
    border-radius:6px;
    border:none;
}

/* FOOTER */
footer{
    background:#111;
    color:#fff;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

/* RESPONSIVE */
@media(max-width:600px){
    header h1{
        font-size:24px;
    }
}
</style>
</head>

<body>

<header>
    <h1>YouTube Promotion & Information Website</h1>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="contact.html" target="_blank">Contact</a> <!-- Updated -->
</nav>

<section id="home">
    <div class="card">
        <h2>Introduction</h2>
        <p>
            This project is a simple website created to promote a YouTube gaming channel.
            It focuses on Free Fire gameplay and shorts.
        </p>

        <!-- YouTube Channel Embed -->
        <iframe 
            src="https://www.youtube.com/embed?listType=user_uploads&list=manyu_444"
            allowfullscreen>
        </iframe>

        <a class="btn" href="https://youtube.com/@manyu_444" target="_blank">
            Visit YouTube Channel
        </a>
    </div>
</section>

<footer>
    © 2026 MANYU444
</footer>

</body>
</html>
